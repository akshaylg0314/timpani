name: CI Dispatcher

on:
  workflow_dispatch:
  push:
  pull_request:
    
permissions: write-all

# Cancel any in-progress run for the same branch/PR when a new commit is pushed.
# This prevents stuck tarpaulin runs from piling up and blocking new ones.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  #  Job 1: Detect file changes and conditionally trigger jobs based on them
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      rust_changed: ${{ steps.filter.outputs.rust }}  # Set to true if any Rust-relevant files changed
      doc_changed: ${{ steps.filter.outputs.docs }}   # True if docs (Markdown) changed
      yaml_changed: ${{ steps.filter.outputs.yaml }}  # True if GitHub workflow YAMLs changed
      cpp_changed: ${{ steps.filter.outputs.cpp }}    # True if C/C++ files changed
    steps:
      # Step 1: Checkout repo contents
      - uses: actions/checkout@v4

      # Step 2: Use `dorny/paths-filter` to detect what kinds of files changed
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - '**/*.rs'         # All Rust source files
              - '**/*.toml'       # Cargo.toml or other TOML configs
              - 'Cargo.lock'      # Cargo.lock for dependency changes
              - 'scripts/**'      # Shell scripts that might affect build/test
              - 'Makefile'        # Dev tooling changes
              - '**/*.yaml'       # Scenario or config YAMLs
              - '**/*.sh'         # Bash scripts
            docs:
              - '**/*.md'         # Markdown docs (README, etc.)
            yaml:
              - '.github/workflows/*.yml'  # GitHub workflow YAMLs
            cpp:
              - '**/*.c'          # C source files
              - '**/*.h'          # C header files
              - '**/*.cpp'        # C++ source files
              - '**/*.hpp'        # C++ header files
              - '**/*.cc'         # Alternative C++ extension
              - '**/CMakeLists.txt'  # CMake build files
              - '**/*.cmake'      # CMake modules
              - 'timpani-n/**'    # timpani-n C project
              - 'timpani-o/**'    # timpani-o C++ project
              - 'libtrpc/**'      # libtrpc C library
              - 'sample-apps/**'  # sample applications

  #  Job 2: Trigger full Rust CI workflow if Rust files or configs changed
  run-rust-ci:
    needs: detect-changes
    if: needs.detect-changes.outputs.rust_changed == 'true'
    uses: ./.github/workflows/run-rust-ci.yml  # Reuse centralized Rust CI logic

  #  Job 3: Run markdown/documentation linter if only docs changed
  run-doc-lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.doc_changed == 'true'
    uses: ./.github/workflows/run-doc.yml

  #  Job 4: Validate GitHub YAML workflows (lint schema or check logic)
  run-yaml-validation:
    needs: detect-changes
    if: needs.detect-changes.outputs.yaml_changed == 'true'
    uses: ./.github/workflows/run-validate.yml

  #  Job 5: Run CodeQL security analysis on C/C++ code if relevant files changed
  run-codeql-analysis:
    needs: detect-changes
    if: needs.detect-changes.outputs.cpp_changed == 'true'
    uses: ./.github/workflows/codeql-analysis.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  #  Job 6: Always run this last to print a clean summary in Actions UI
  ci-summary:
    name: CI Complete Summary
    runs-on: ubuntu-latest
    # 'always()' ensures this runs even when all upstream jobs were skipped.
    # Without this condition GitHub may fail to queue the summary job when
    # every needs-job is skipped (no matching file changes).
    if: always()
    needs:
      - detect-changes
      - run-rust-ci
      - run-doc-lint
      - run-yaml-validation
      - run-codeql-analysis
    steps:
      - name: Report CI outcome
        run: |
          echo "rust_changed : ${{ needs.detect-changes.outputs.rust_changed }}"
          echo "doc_changed  : ${{ needs.detect-changes.outputs.doc_changed }}"
          echo "yaml_changed : ${{ needs.detect-changes.outputs.yaml_changed }}"
          echo "cpp_changed  : ${{ needs.detect-changes.outputs.cpp_changed }}"
          echo "rust-ci      : ${{ needs.run-rust-ci.result }}"
          echo "doc-lint     : ${{ needs.run-doc-lint.result }}"
          echo "yaml-validate: ${{ needs.run-yaml-validation.result }}"
          echo "codeql       : ${{ needs.run-codeql-analysis.result }}"
          echo "All CI jobs (if triggered) have completed."
